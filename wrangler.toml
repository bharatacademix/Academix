name = "global-academic-assist-api"
main = "server/worker.ts"
compatibility_date = "2024-12-16"
type = "service"

# Environment variables for production
[env.production]
vars = { ENVIRONMENT = "production" }
name = "global-academic-assist-api-prod"

# Environment variables for staging
[env.staging]
vars = { ENVIRONMENT = "staging" }
name = "global-academic-assist-api-staging"

# Configure build
[build]
command = "npm install && npm run build:worker"
cwd = "./"
watch_paths = ["server/**/*.ts"]

# Routes configuration
routes = [
  { pattern = "https://api.your-domain.com/api/*", zone_name = "your-domain.com" }
]

# Database bindings (if using D1 or KV)
[[kv_namespaces]]
binding = "AUTH_CACHE"
id = "your-kv-namespace-id"
